version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# DeployMate — multi-container compose file
#
# Usage:
#   1. Copy .env.example to .env and fill in real values.
#   2. mkdir -p ~/Documents/data/deploymate/postgres
#   3. docker compose up --build
#   4. Open http://localhost:9091
#
# The MCP server is NOT containerised (it runs as a local stdio process
# connected to Claude; see mcp/ directory for setup instructions).
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL database ────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: deploymate-postgres
    environment:
      POSTGRES_DB:       deploymate
      POSTGRES_USER:     ${DATABASE_USER:-deploymate}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-deploymate}
    volumes:
      - ${HOME}/Documents/data/deploymate/postgres:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-deploymate} -d deploymate"]
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 10s
    restart: unless-stopped

  # ── DeployMate application ─────────────────────────────────────────────────
  deploymate:
    build:
      context: .
      dockerfile: Dockerfile
    image: deploymate:latest
    container_name: deploymate

    depends_on:
      postgres:
        condition: service_healthy

    # ── Port mapping ───────────────────────────────────────────────────────
    ports:
      - "9091:8080"
      - "5005:5005"

    # ── Environment (reads from .env file in project root) ─────────────────
    env_file:
      - .env
    environment:
      - DATABASE_URL=jdbc:postgresql://postgres:5432/deploymate
      - DATABASE_USER=${DATABASE_USER:-deploymate}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD:-deploymate}

    # ── Named volume for log persistence ──────────────────────────────────
    volumes:
      - deploymate_logs:/app/logs
      - ./frontend/public/services.json:/app/static/services.json:ro

    # ── Health check — Spring Boot Actuator-compatible (plain endpoint) ────
    healthcheck:
      test:     ["CMD-SHELL", "wget -qO- http://localhost:8080/ | grep -q 'DeployMate\\|html' || exit 1"]
      interval: 30s
      timeout:  10s
      retries:  3
      start_period: 60s

    # ── Restart policy ─────────────────────────────────────────────────────
    restart: unless-stopped

    # ── Resource limits (adjust to your host) ─────────────────────────────
    deploy:
      resources:
        limits:
          memory: 768M
          cpus:   "1.0"
        reservations:
          memory: 256M

# ─────────────────────────────────────────────────────────────────────────────
volumes:
  deploymate_logs:
    driver: local
